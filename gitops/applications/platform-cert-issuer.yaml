apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-issuer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wesen/crib-k3s.git
    targetRevision: main
    path: gitops/kustomize/platform-cert-issuer
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
