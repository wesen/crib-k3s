apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-crib
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/wesen/crib-k3s.git
    targetRevision: main
    path: gitops/kustomize/argocd-crib
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
