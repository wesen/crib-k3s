apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poll-modem
  namespace: poll-modem
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - modem.crib.scapegoat.dev
      secretName: crib-scapegoat-dev-tls
  rules:
    - host: modem.crib.scapegoat.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: poll-modem
                port:
                  name: http
