apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.crib.scapegoat.dev`)
      services:
        - name: monitoring-grafana
          port: 80
  tls:
    secretName: crib-scapegoat-dev-tls
